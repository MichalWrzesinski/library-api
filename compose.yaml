services:
  app:
    build:
      context: .
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "8080:8000"
    depends_on:
      - database
    environment:
      DATABASE_URL: postgresql://app:app@database:5432/library_api?serverVersion=16&charset=utf8
    command: php -S 0.0.0.0:8000 -t public

  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: library_api
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    volumes:
      - database_data:/var/lib/postgresql/data

volumes:
  database_data:
